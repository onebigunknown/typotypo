<style>
  :root {
    color-scheme: light;
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-soft: #fafafa;
    --text: #111111;
    --muted: #8a8a8a;
    --line: #111111;
    --line-soft: #e3e3e3;
    --control-on-bg: #111111;
    --control-on-text: #ffffff;
    --control-off-bg: #ffffff;
    --control-off-dot: #111111;
    --highlight-bg: #111111;
    --highlight-text: #ffffff;
    --button-bg: #111111;
    --button-text: #ffffff;
    --button-disabled-bg: #ffffff;
    --button-disabled-text: #8a8a8a;
    --disabled-number: #c7c7c7;
    --shadow: 0 18px 50px -12px rgba(20, 20, 40, 0.18);
    --font-ui: Helvetica, Arial, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    --w: 420px;
    --h: 640px;
    --border: 2px;
    --topbar-h: 40px;
    --footer-h: 48px;
    --compact-h: 65px;
    --settings-spacer-h: 245px;
    --row-h: 40px;
    --reset-h: 38px;
    --px: 14px;
  }

  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #2c2c2c;
    --surface: #2c2c2c;
    --surface-soft: #303030;
    --text: #f5f5f5;
    --muted: #8a8a8a;
    --line: #5c5c5c;
    --line-soft: #3d3d3d;
    --control-on-bg: #f5f5f5;
    --control-on-text: #111111;
    --control-off-bg: #2c2c2c;
    --control-off-dot: #8a8a8a;
    --highlight-bg: #111111;
    --highlight-text: #ffffff;
    --button-bg: #f5f5f5;
    --button-text: #111111;
    --button-disabled-bg: #2c2c2c;
    --button-disabled-text: #8a8a8a;
    --disabled-number: #5c5c5c;
    --shadow: 0 18px 50px -12px rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; }

  html, body {
    width: var(--w);
    height: var(--h);
    margin: 0;
    overflow: hidden;
    background: transparent;
  }

  body, button, input, select {
    font-family: var(--font-ui);
    font-size: 13px;
    line-height: 1;
    font-weight: 400;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  button {
    appearance: none;
    border-radius: 0;
    padding: 0;
    background: transparent;
    border: 0;
    color: inherit;
    cursor: pointer;
  }

  .app {
    position: relative;
    width: var(--w);
    height: var(--h);
    overflow: hidden;
    background: var(--bg);
    border: var(--border) solid var(--line);
    box-shadow: var(--shadow);
  }

  .topbar {
    position: absolute;
    inset: 0 0 auto 0;
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 var(--px);
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }

  .brand {
    margin: 0;
    font-size: 13px;
    line-height: 1;
    font-weight: 400;
    letter-spacing: 0;
    white-space: nowrap;
  }

  .scope {
    max-width: 250px;
    overflow: hidden;
    color: var(--text);
    font-size: 12px;
    line-height: 1;
    font-weight: 400;
    text-align: right;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .content {
    position: absolute;
    inset: var(--topbar-h) 0 var(--footer-h) 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    background: var(--surface);
  }

  .format-area {
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }

  .format-area.is-compact { display: none; }

  .format-inner,
  .hero {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .hero { padding: 12px var(--px); }

  .hero-number,
  .result-number,
  .progress-number {
    display: block;
    font-size: 220px;
    line-height: 209px;
    letter-spacing: -4.4px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .hero-number[data-digits="4"],
  .result-number[data-digits="4"],
  .progress-number[data-digits="4"] {
    font-size: 164px;
    line-height: 164px;
    letter-spacing: -3.2px;
  }

  .hero-number[data-digits="5"],
  .result-number[data-digits="5"],
  .progress-number[data-digits="5"] {
    font-size: 132px;
    line-height: 132px;
    letter-spacing: -2.6px;
  }



  .hero-number.is-muted,
  .compact-number.is-muted,
  .result-number.is-muted {
    color: var(--disabled-number);
  }

  .hero-label,
  .result-label,
  .progress-label {
    max-width: 360px;
    margin-top: 6px;
    font-size: 13px;
    line-height: 1.15;
    font-weight: 400;
    letter-spacing: 0;
  }

  .hero .summary-rows,
  .result-screen .summary-rows {
    position: absolute;
    left: var(--px);
    right: var(--px);
    bottom: 12px;
  }

  .compact-summary {
    display: none;
    flex: 0 0 var(--compact-h);
    align-items: baseline;
    gap: 8px;
    min-height: var(--compact-h);
    padding: 11px var(--px) 0;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }

  .compact-summary.is-visible { display: flex; }

  /* v12: make the compact layout depend on the app state too, not only on JS classes.
     In the real Figma plugin the rules panel can be open while the old hero area is still present;
     these selectors force the Figma reference layout: compact summary + rules/settings rows. */
  .app[data-view="main"][data-panel="rules"] .format-area,
  .app[data-view="main"][data-panel="settings"] .format-area {
    display: none;
  }

  .app[data-view="main"][data-panel="rules"] .compact-summary,
  .app[data-view="main"][data-panel="settings"] .compact-summary {
    display: flex;
  }

  .app[data-view="applying"] .format-area,
  .app[data-view="result"] .format-area,
  .app[data-view="applying"] .compact-summary {
    display: none !important;
  }

  .app[data-view="result"][data-panel="rules"] .result-screen,
  .app[data-view="result"][data-panel="settings"] .result-screen {
    display: none !important;
  }

  .app[data-view="result"][data-panel="rules"] .compact-summary,
  .app[data-view="result"][data-panel="settings"] .compact-summary {
    display: flex;
  }

  .compact-number {
    font-size: 40px;
    line-height: 40px;
    letter-spacing: -1.6px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .compact-label {
    align-self: baseline;
    padding-top: 0;
    font-size: 11px;
    line-height: 1;
    font-weight: 400;
    white-space: nowrap;
  }

  .progress-screen,
  .result-screen {
    display: none;
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    padding: 12px var(--px);
    overflow: hidden;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }

  .progress-screen.is-visible,
  .result-screen.is-visible { display: block; }

  .progress-track {
    position: absolute;
    left: var(--px);
    right: var(--px);
    bottom: 12px;
    height: 1px;
    background: var(--line-soft);
    overflow: hidden;
  }

  .progress-fill {
    width: 0%;
    height: 100%;
    background: var(--line);
    transition: width 140ms cubic-bezier(0.2, 0, 0, 1);
  }

  .summary-rows {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
    color: var(--text);
    font-size: 12px;
    line-height: 1;
    font-weight: 400;
  }

  .summary-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    column-gap: 7px;
    row-gap: 4px;
    min-width: 0;
    overflow: visible;
    white-space: normal;
  }

  .summary-token {
    display: inline-flex;
    flex: 0 0 auto;
    align-items: baseline;
    gap: 7px;
    min-width: 0;
    max-width: 100%;
    white-space: nowrap;
  }

  .summary-item { white-space: nowrap; }
  .summary-separator { color: var(--muted); }

  .rows {
    position: relative;
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    background: var(--surface);
  }

  .app[data-panel="main"] .rows { flex: 0 0 calc(var(--row-h) * 2); }

  .app[data-panel="rules"] .rows { flex: 1 1 auto; }

  .app[data-panel="rules"][data-rules-mode="closed"] .rows {
    padding-top: 203px;
  }

  .app[data-panel="rules"][data-rules-mode="closed"] .rows::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: 203px;
    border-bottom: 1px solid var(--line);
    pointer-events: none;
  }

  .app[data-panel="rules"][data-rules-mode="group"] #settingsToggle {
    display: none;
  }

  .app[data-panel="settings"] .rows {
    flex: 1 1 auto;
    padding-top: var(--settings-spacer-h);
  }

  .app[data-panel="settings"] .rows::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: var(--settings-spacer-h);
    border-bottom: 1px solid var(--line);
    pointer-events: none;
  }

  .nav-row {
    position: relative;
    flex: 0 0 var(--row-h);
    width: 100%;
    height: var(--row-h);
    display: grid;
    grid-template-columns: minmax(0, 1fr) max-content;
    align-items: center;
    gap: 0;
    padding: 0 var(--px);
    border-bottom: 1px solid var(--line-soft);
    background: var(--surface);
    text-align: left;
  }

  .nav-row[aria-expanded="true"] {
    border-bottom-color: var(--line);
  }

  .app[data-panel="settings"] #settingsToggle,
  .app[data-panel="settings"] #rulesToggle { background: var(--surface); }

  .app[data-panel="settings"] #settingsToggle {
    border-top: 1px solid var(--line);
    border-bottom: 0;
    background: var(--surface-soft);
  }

  .nav-row > .chevron { display: none; }

  .nav-title {
    min-width: 0;
    overflow: hidden;
    font-size: 13px;
    line-height: 1;
    font-weight: 700;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .nav-meta {
    justify-self: end;
    margin-left: 12px;
    font-size: 12px;
    line-height: 1;
    font-weight: 400;
    white-space: nowrap;
  }

  .panel {
    display: none;
    min-height: 0;
    overflow: hidden;
    background: var(--surface);
  }

  .panel.is-open {
    display: flex;
    flex-direction: column;
  }

  #rulesPanel.is-open { flex: 1 1 auto; }
  #settingsPanel.is-open { flex: 0 0 auto; }

  .panel-inner,
  .panel-scroll {
    min-height: 0;
    width: 100%;
  }

  .panel-inner { flex: 1 1 auto; }
  .panel-scroll {
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    scrollbar-width: thin;
  }



  /* v18: rules/settings content scrolls as one stack, so Settings is reachable after long rule groups. */
  .app[data-panel="rules"] .rows,
  .app[data-panel="settings"] .rows {
    overflow-x: hidden;
    overflow-y: auto;
    scrollbar-width: thin;
  }

  .app[data-panel="rules"] #rulesPanel.is-open,
  .app[data-panel="settings"] #settingsPanel.is-open {
    flex: 0 0 auto;
  }

  .app[data-panel="rules"] #rulesPanel .panel-scroll,
  .app[data-panel="settings"] #settingsPanel .panel-scroll {
    height: auto;
    overflow: visible;
  }

  .app[data-panel="rules"][data-rules-mode="group"] #settingsToggle {
    display: grid;
  }

  .app[data-panel="rules"] #rulesToggle,
  .app[data-panel="settings"] #rulesToggle {
    border-top: 1px solid var(--line);
  }

  .rule-groups { width: 100%; }

  .group { border-bottom: 1px solid var(--line-soft); }

  .group-button {
    width: 100%;
    height: var(--row-h);
    display: grid;
    grid-template-columns: 16px minmax(0, 1fr) minmax(26px, max-content) 40px;
    align-items: center;
    padding: 0 var(--px);
    text-align: left;
    background: var(--surface);
  }

  .group.is-open > .group-button { background: var(--surface-soft); }

  .group-button .chevron {
    width: 16px;
    font-size: 11px;
    line-height: 1;
    font-weight: 400;
  }

  .group.is-open > .group-button .chevron { transform: rotate(90deg); }

  .group-title {
    min-width: 0;
    overflow: hidden;
    font-size: 13px;
    line-height: 1;
    font-weight: 400;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .group.is-open > .group-button .group-title { font-weight: 700; }

  .group.is-disabled > .group-button .chevron,
  .group.is-disabled > .group-button .group-title,
  .group.is-disabled > .group-button .group-count { color: var(--muted); }

  .group-count {
    min-width: 26px;
    padding-left: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1;
    font-weight: 400;
    text-align: right;
    white-space: nowrap;
  }

  .switch {
    justify-self: end;
    display: flex;
    align-items: center;
    width: 30px;
    height: 17px;
    margin-left: 10px;
    padding: 1px 3px;
    border: 1px solid var(--line);
    background: var(--control-off-bg);
  }

  .switch::before {
    content: "";
    display: block;
    width: 9px;
    height: 9px;
    background: var(--control-off-dot);
  }

  .switch.is-on {
    justify-content: flex-end;
    border-color: var(--control-on-bg);
    background: var(--control-on-bg);
  }

  .switch.is-on::before { background: var(--control-on-text); }
  .switch.is-off { justify-content: flex-start; }
  .switch.is-mixed { justify-content: center; }

  .group-content { display: none; }
  .group.is-open > .group-content { display: block; }

  .group-content-inner { padding: 2px 0 12px; }

  .rule-list { width: 100%; }

  .rule {
    position: relative;
    width: 100%;
    min-height: 50px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 30px;
    align-items: start;
    gap: 12px;
    padding: 10px var(--px) 8px 30px;
    border-bottom: 0;
    background: var(--surface);
  }

  .rule > div:first-child { min-width: 0; }

  .rule-name {
    min-width: 0;
    overflow: hidden;
    font-size: 13px;
    line-height: 1.08;
    font-weight: 400;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .rule-tag { display: none; }

  .rule-desc {
    min-width: 0;
    margin-top: 4px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1;
    font-weight: 400;
    white-space: nowrap;
  }

  .example-highlight {
    display: inline-block;
    min-width: 0;
    padding: 0 2px;
    background: var(--highlight-bg);
    color: var(--highlight-text);
  }

  .example-strong { color: var(--text); }

  .switch-input {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  .rule > .switch { margin-top: 1px; }

  .rule.is-disabled .rule-name,
  .rule.is-disabled .rule-desc { color: var(--muted); }

  .quote-settings {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 var(--px) 8px 46px;
  }

  .quote-setting-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    height: 22px;
  }

  .quote-setting-label {
    flex: 0 0 56px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1;
    white-space: nowrap;
  }

  .quote-options {
    display: flex;
    align-items: stretch;
    min-width: 0;
  }

  .quote-option {
    height: 22px;
    min-width: 34px;
    padding: 0 8px;
    border: 1px solid var(--line);
    border-left: 0;
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1;
    font-weight: 400;
    white-space: nowrap;
  }

  .quote-option:first-child { border-left: 1px solid var(--line); }
  .quote-option.is-active { background: var(--control-on-bg); color: var(--control-on-text); border-color: var(--control-on-bg); }

  .quote-settings-note {
    display: block;
    min-width: 0;
    overflow: hidden;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1;
    white-space: nowrap;
  }

  .settings-groups { width: 100%; }

  .setting-row {
    height: var(--row-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 0 var(--px);
    border-top: 1px solid var(--line-soft);
    background: var(--surface);
  }

  .setting-label {
    min-width: 0;
    overflow: hidden;
    font-size: 13px;
    line-height: 1;
    font-weight: 400;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .segments {
    display: flex;
    align-items: stretch;
    flex: 0 0 auto;
    height: 22px;
  }

  .segment {
    min-width: 34px;
    height: 22px;
    padding: 0 10px;
    border: 1px solid var(--line);
    border-left: 0;
    background: var(--surface);
    color: var(--text);
    font-size: 11px;
    line-height: 1;
    font-weight: 400;
    white-space: nowrap;
  }

  .segment:first-child { border-left: 1px solid var(--line); }
  .segment.is-active { background: var(--control-on-bg); color: var(--control-on-text); border-color: var(--control-on-bg); }

  .settings-reset-row {
    height: var(--reset-h);
    display: grid;
    grid-template-columns: minmax(0, 253px) max-content;
    align-items: center;
    gap: 23px;
    padding: 0 var(--px);
    border-top: 1px solid var(--line-soft);
    background: var(--surface);
  }

  .settings-note {
    min-width: 0;
    margin: 0;
    overflow: hidden;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1;
    font-weight: 400;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .link-button {
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1;
    font-weight: 400;
    text-align: left;
    text-decoration: underline;
    text-underline-offset: 2px;
    white-space: nowrap;
  }

  .footer {
    position: absolute;
    inset: auto 0 0 0;
    height: var(--footer-h);
    z-index: 5;
  }

  .primary-action {
    width: 100%;
    height: var(--footer-h);
    border-top: 1px solid var(--line);
    background: var(--button-bg);
    color: var(--button-text);
    font-size: 13px;
    line-height: 1;
    font-weight: 700;
    text-align: center;
  }

  .primary-action:disabled {
    background: var(--button-disabled-bg);
    color: var(--button-disabled-text);
    cursor: not-allowed;
  }

  .is-hidden { display: none !important; }

  .nav-row:focus,
  .group-button:focus,
  .rule:focus-within,
  .segment:focus,
  .quote-option:focus,
  .link-button:focus,
  .primary-action:focus { outline: none; }

  .nav-row:focus-visible,
  .group-button:focus-visible,
  .rule:focus-within,
  .segment:focus-visible,
  .quote-option:focus-visible,
  .link-button:focus-visible,
  .primary-action:focus-visible {
    outline: 1px solid var(--text);
    outline-offset: -1px;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition: none !important;
      animation: none !important;
    }
  }


  /* v19: left vertical navigation. Format / Rules / Settings are stable side tabs. */
  :root { --side-w: 46px; }

  .side-tabs {
    position: absolute;
    inset: 0 auto var(--footer-h) 0;
    z-index: 10;
    width: var(--side-w);
    display: grid;
    grid-template-rows: 1fr 1fr 1fr;
    border-right: 1px solid var(--line);
    background: var(--surface);
  }

  .side-tab {
    width: 100%;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    line-height: 1;
    font-weight: 700;
    text-align: center;
  }

  .side-tab:last-child { border-bottom: 0; }
  .side-tab span {
    display: block;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    white-space: nowrap;
  }

  .side-tab.is-active {
    background: var(--button-bg);
    color: var(--button-text);
  }

  .topbar {
    left: var(--side-w);
    right: 0;
    width: auto;
  }

  .content {
    inset: 0 0 var(--footer-h) var(--side-w);
    padding-top: var(--topbar-h);
  }

  .footer {
    left: var(--side-w);
    right: 0;
    width: auto;
  }

  .app[data-panel="main"] .rows { display: none !important; }
  .app[data-panel="main"] .format-area { display: block; }

  .app[data-panel="rules"] .format-area,

        uiFinalPeriod: ["Без точки в коротких надписях", "Убирает финальную точку в коротком интерфейсном тексте.", "Сохранено. → Сохранено"],
      },
    },
  };

  let state = {
    uiLanguage: readStoredUiLanguage() || getDetectedUiLanguage(),
    languageMode: "auto",
    theme: readStoredTheme() || "system",
    isLoadingSettings: true,
    isApplying: false,
    activePanel: "main",
    view: "main",
    openRuleGroup: null,
    animatedSwitchKeys: [],
    currentTargetScope: "selection",
    currentAvailableTextNodeCount: 0,
    lastSelectionInfoMessage: null,
    lastApplyResultMessage: null,
    lastApplyCompletedAt: 0,
    applySelectionSignature: "",
    progressDone: 0,
    progressTotal: 0,
    enabledRules: getDefaultEnabledRules("auto"),
    options: {
      nonBreakingSpaceStyle: "regular",
      quoteOptions: {
        ru: { primaryQuoteStyle: "frenchGuillemets", secondaryQuoteStyle: "germanLowHigh" },
        en: { primaryQuoteStyle: "englishDouble", secondaryQuoteStyle: "englishSingle" },
      },
    },
  };

  function getCopy(path) {
    const dictionary = copy[state.uiLanguage] || copy.en;
    const fallback = copy.en;
    return path.split(".").reduce((acc, key) => (acc ? acc[key] : undefined), dictionary) ??
      path.split(".").reduce((acc, key) => (acc ? acc[key] : undefined), fallback) ??
      path;
  }

  function interpolate(template, values) {
    return String(template).replace(/\{(\w+)\}/g, (_, key) => String(values[key] ?? ""));
  }

  function countLabel(count, label) {
    return `${count}${NBSP}${label}`;
  }

  function isRu() {
    return state.uiLanguage === "ru";
  }

  function ruPlural(count, one, few, many) {
    const value = Math.abs(Number(count || 0));
    const mod10 = value % 10;
    const mod100 = value % 100;
    if (mod10 === 1 && mod100 !== 11) return one;
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
    return many;
  }

  function ruTextLayerSubject(count) {
    return ruPlural(count, "текстовый слой", "текстовых слоя", "текстовых слоёв");
  }

  function ruTextLayerGenitive(count) {
    const value = Math.abs(Number(count || 0));
    const mod10 = value % 10;
    const mod100 = value % 100;
    return mod10 === 1 && mod100 !== 11 ? "текстового слоя" : "текстовых слоёв";
  }

  function ruTextLayerPrepositional(count) {
    const value = Math.abs(Number(count || 0));
    const mod10 = value % 10;
    const mod100 = value % 100;
    return mod10 === 1 && mod100 !== 11 ? "текстовом слое" : "текстовых слоях";
  }

  function ruReadyVerb(count) {
    return ruPlural(count, "готов", "готовы", "готовы");
  }

  function ruCheckedLayersLabel(count) {
    return ruPlural(count, "текстовый слой проверен", "текстовых слоя проверены", "текстовых слоёв проверено");
  }

  function statusItem(key, count) {
    const status = getCopy("status");
    const value = Number(count || 0);

    if (!isRu()) {
      if (key === "error") return countLabel(value, value === 1 ? status.error : status.errors);
      return countLabel(value, status[key]);
    }

    const label = {
      found: ruPlural(value, "найден", "найдено", "найдено"),
      available: ruPlural(value, "доступен", "доступно", "доступно"),
      locked: ruPlural(value, "заблокирован", "заблокировано", "заблокировано"),
      hidden: ruPlural(value, "скрыт", "скрыто", "скрыто"),
      empty: ruPlural(value, "пустой", "пустых", "пустых"),
      nonEditable: "нельзя редактировать",
      missingFonts: "без нужных шрифтов",
      error: ruPlural(value, "ошибка", "ошибки", "ошибок"),
      formatted: ruPlural(value, "отформатирован", "отформатировано", "отформатировано"),
    }[key] || status[key];

    return countLabel(value, label);
  }

  function checkedLayersItem(count) {
    const value = Number(count || 0);
    if (isRu()) return countLabel(value, ruCheckedLayersLabel(value));
    return countLabel(value, getCopy("result.layersChecked"));
  }

  function resultChangesLabel(changeCount, layerCount) {
    const changes = Number(changeCount || 0);
    const layers = Number(layerCount || 0);

    if (isRu()) {
      const changeLabel = ruPlural(changes, "изменение", "изменения", "изменений");
      return `${changeLabel} в ${layers}${NBSP}${ruTextLayerPrepositional(layers)}`;
    }

    return interpolate(getCopy("result.changesAppliedInLayers"), { count: layers });
  }

  function getSelectionSignature(message) {
    const source = message || {};
    return [
      source.selectionKey || "",
      source.targetScope || source.scopeType || "",
      source.selectedCount || 0,
      source.textNodeCount || 0,
      source.availableTextNodeCount || 0,
      source.skippedHiddenNodeCount || source.hiddenCount || 0,
      source.skippedLockedNodeCount || source.lockedCount || 0,
      source.skippedEmptyNodeCount || source.emptyCount || 0,
      source.skippedNonEditableNodeCount || source.nonEditableCount || 0,
      source.skippedMissingFontsNodeCount || source.missingFontsCount || 0,
      source.errorNodeCount || source.errorCount || 0,
    ].join(":");
  }

  function normalizeUiLanguage(value) {
    return value === "ru" || value === "en" ? value : null;
  }

  function normalizeTheme(value) {
    return value === "light" || value === "dark" || value === "system" ? value : null;
  }

  function getDetectedUiLanguage() {
    const languages = [];
    if (Array.isArray(navigator.languages)) languages.push(...navigator.languages);
    if (navigator.language) languages.push(navigator.language);
    return languages.some((language) => String(language).toLowerCase().startsWith("ru")) ? "ru" : "en";
  }

  function readStoredUiLanguage() {
    try { return normalizeUiLanguage(window.localStorage.getItem(UI_LANGUAGE_STORAGE_KEY)); }
    catch (error) { return null; }
  }

  function writeStoredUiLanguage(language) {
    try { window.localStorage.setItem(UI_LANGUAGE_STORAGE_KEY, language); }
    catch (error) {}
  }

  function readStoredTheme() {
    try { return normalizeTheme(window.localStorage.getItem(THEME_STORAGE_KEY)); }
    catch (error) { return null; }
  }

  function writeStoredTheme(theme) {
    try { window.localStorage.setItem(THEME_STORAGE_KEY, theme); }
    catch (error) {}
  }

  function getSystemTheme() {
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }

  function applyTheme() {
    const effectiveTheme = state.theme === "system" ? getSystemTheme() : state.theme;
    document.documentElement.dataset.theme = effectiveTheme;
  }

  function getDefaultQuoteOptions() {
    return {
      ru: {
        primaryQuoteStyle: "frenchGuillemets",
        secondaryQuoteStyle: "germanLowHigh",
      },
      en: {
        primaryQuoteStyle: "englishDouble",
        secondaryQuoteStyle: "englishSingle",
      },
    };
  }

  function getDefaultEnabledRules(languageMode) {
    const enabledRules = {};
    ruleDefinitions.forEach((rule) => { enabledRules[rule.id] = true; });

    if (languageMode === "ru") {
      enabledRules.englishApostrophes = false;
      enabledRules.englishQuotes = false;
    }

    if (languageMode === "en") {
      enabledRules.russianQuotes = false;
      enabledRules.russianSentenceDash = false;
      enabledRules.russianShortWordsNbsp = false;
      enabledRules.russianInitialsNbsp = false;
      enabledRules.russianNumericAbbreviations = false;
      enabledRules.russianLargeNumbers = false;
    }

    return enabledRules;
  }

  function getSettings() {
    return {
      languageMode: state.languageMode,
      options: state.options,
      enabledRules: state.enabledRules,
    };
  }

  function getUiSettings() {
    return {
      uiLanguage: state.uiLanguage,
      theme: state.theme,
    };
  }

  function saveCurrentUiSettings() {
    writeStoredUiLanguage(state.uiLanguage);
    writeStoredTheme(state.theme);
    parent.postMessage({ pluginMessage: { type: "save-ui-settings", uiSettings: getUiSettings() } }, "*");
  }

  function saveCurrentSettings() {
    if (state.isLoadingSettings) return;
    parent.postMessage({ pluginMessage: { type: "save-settings", settings: getSettings() } }, "*");
  }

  function hasEnabledRules() {
    return Object.values(state.enabledRules).some(Boolean);
  }

  function enabledRulesCount() {
    return ruleDefinitions.filter((rule) => state.enabledRules[rule.id]).length;
  }

  function totalRulesCount() {
    return ruleDefinitions.length;
  }

  function enabledRulesInGroup(groupId) {
    return ruleDefinitions.filter((rule) => rule.group === groupId && state.enabledRules[rule.id]).length;
  }

  function totalRulesInGroup(groupId) {
    return ruleDefinitions.filter((rule) => rule.group === groupId).length;
  }


  function setNumberContent(element, value) {
    if (!element) return;
    const text = String(value);
    element.textContent = text;
    element.dataset.digits = String(text.replace(/\D/g, "").length || text.length);
  }

  function createElement(tag, className, text) {
    const element = document.createElement(tag);
    if (className) element.className = className;
    if (text !== undefined) element.textContent = text;
    return element;
  }

  function createSwitch(stateName, animationKey = "") {
    const switchElement = createElement("span", `switch ${stateName || ""}`.trim());
    switchElement.setAttribute("aria-hidden", "true");
    if (animationKey && state.animatedSwitchKeys.includes(animationKey)) {
      switchElement.classList.add("is-animating");
    }
    return switchElement;
  }

  function getGroupSwitchState(groupId) {
    const enabled = enabledRulesInGroup(groupId);
    const total = totalRulesInGroup(groupId);
    if (enabled === 0) return "is-off";
    if (enabled === total) return "is-on";
    return "is-mixed";
  }

  function setGroupEnabled(groupId, enabled) {
    ruleDefinitions.filter((rule) => rule.group === groupId).forEach((rule) => {
      state.enabledRules[rule.id] = enabled;
    });
    saveCurrentSettings();
    render();
  }

  function renderStatusRows(container, rows) {
    container.textContent = "";

    rows.filter((row) => row.length > 0).forEach((row) => {
      const rowElement = createElement("div", "summary-row");

      row.forEach((item, index) => {
        const tokenElement = createElement("span", "summary-token");
        const previousItem = index > 0 ? String(row[index - 1] || "") : "";

        if (index > 0 && !previousItem.endsWith(":")) {
          tokenElement.appendChild(createElement("span", "summary-separator", "·"));
        }

        tokenElement.appendChild(createElement("span", "summary-item", item));
        rowElement.appendChild(tokenElement);
      });

      container.appendChild(rowElement);
    });
  }

  function getSelectionInfo() {
    const message = state.lastSelectionInfoMessage || {};
    const targetScope = message.targetScope === "currentPage" ? "currentPage" : "selection";
    const reportedScopeType = message.scopeType;
    const scopeType = ["currentPage", "textLayer", "frame", "section", "group", "selectedLayers", "selection"].includes(reportedScopeType)
      ? reportedScopeType
      : (targetScope === "currentPage" ? "currentPage" : "selectedLayers");
    const textNodeCount = Number(message.textNodeCount || 0);
    const availableTextNodeCount = Number(message.availableTextNodeCount || 0);

    return {
      targetScope,
      scopeType,
      foundCount: textNodeCount,
      availableCount: availableTextNodeCount,
      lockedCount: Number(message.skippedLockedNodeCount || message.lockedCount || 0),
      hiddenCount: Number(message.skippedHiddenNodeCount || message.hiddenCount || 0),
      emptyCount: Number(message.skippedEmptyNodeCount || message.emptyCount || 0),
      nonEditableCount: Number(message.skippedNonEditableNodeCount || message.nonEditableCount || 0),
      missingFontsCount: Number(message.skippedMissingFontsNodeCount || message.missingFontsCount || 0),
      errorCount: Number(message.errorNodeCount || message.errorCount || 0),
    };
  }

  function makeSkippedItems(info, mode) {
    const status = getCopy("status");
    const items = [];

    if (info.emptyCount) items.push(statusItem("empty", info.emptyCount));
    if (info.nonEditableCount) items.push(statusItem("nonEditable", info.nonEditableCount));
    if (info.missingFontsCount) items.push(statusItem("missingFonts", info.missingFontsCount));
    if (info.lockedCount) items.push(statusItem("locked", info.lockedCount));
    if (info.hiddenCount) items.push(statusItem("hidden", info.hiddenCount));
    if (info.errorCount) items.push(statusItem("error", info.errorCount));

    if (mode === "main") {
      return items;
    }

    return items;
  }

  function buildMainStatusRows(info) {
    const status = getCopy("status");
    const items = [];

    if (info.foundCount) items.push(statusItem("found", info.foundCount));
    if (info.availableCount || info.foundCount) items.push(statusItem("available", info.availableCount));

    if (info.lockedCount) items.push(statusItem("locked", info.lockedCount));
    if (info.hiddenCount) items.push(statusItem("hidden", info.hiddenCount));
    if (info.emptyCount) items.push(statusItem("empty", info.emptyCount));
    if (info.nonEditableCount) items.push(statusItem("nonEditable", info.nonEditableCount));
    if (info.missingFontsCount) items.push(statusItem("missingFonts", info.missingFontsCount));
    if (info.errorCount) items.push(statusItem("error", info.errorCount));

    if (items.length <= 3) return [items];

    const errorItems = info.errorCount ? [items[items.length - 1]] : [];
    const mainItems = info.errorCount ? items.slice(0, -1) : items;
    return errorItems.length ? [mainItems, errorItems] : [mainItems];
  }

  function formatScope(info) {
    const scope = getCopy("scope");
    if (info.scopeType === "currentPage") return scope.currentPage;
    if (info.scopeType === "textLayer") return scope.textLayer;
    if (info.scopeType === "frame") return scope.frame;
    if (info.scopeType === "section") return scope.section;
    if (info.scopeType === "group") return scope.group;
    return scope.selection;
  }

  function getHeroCount(info) {
    return info.availableCount;
  }

  function getHeroLabel(info) {
    if (info.foundCount > 0 && info.availableCount === 0) {
      return getCopy("main.noAvailable");
    }

    if (isRu()) {
      const count = Number(info.availableCount || 0);
      const subject = ruTextLayerSubject(count);
      const ready = ruReadyVerb(count);

      if (!hasEnabledRules() && count > 0) return `${subject} ${ready} — но правила выключены`;
      if (info.scopeType === "currentPage") {
        return count > 0 ? `${subject} на странице ${ready} к типографированию` : `${subject} на странице`;
      }
      return count > 0 ? `${subject} ${ready} к типографированию` : `${subject} в области`;
    }

    if (!hasEnabledRules() && info.availableCount > 0) return getCopy("main.noRules");
    if (info.scopeType === "currentPage") {
      return info.availableCount > 0 ? getCopy("main.readyOnPage") : getCopy("main.noTextPage");
    }
    return info.availableCount > 0 ? getCopy("main.ready") : getCopy("main.noTextSelection");
  }

  function setActivePanel(panel) {
    state.activePanel = panel;
    if (panel !== "rules") state.openRuleGroup = null;
    render();
  }

  function setView(view) {
    state.view = view;
    render();
  }

  function renderText() {
    document.documentElement.lang = state.uiLanguage;
    document.querySelectorAll("[data-i18n]").forEach((node) => {
      node.textContent = getCopy(node.dataset.i18n);
    });

    document.querySelectorAll('[data-segment-group="languageMode"] .segment[data-value="auto"]').forEach((node) => {
      node.textContent = state.uiLanguage === "ru" ? "Авто" : "Auto";
    });
    document.querySelectorAll('[data-segment-group="theme"] .segment[data-value="light"]').forEach((node) => {
      node.textContent = state.uiLanguage === "ru" ? "Светлая" : "Light";
    });
    document.querySelectorAll('[data-segment-group="theme"] .segment[data-value="dark"]').forEach((node) => {
      node.textContent = state.uiLanguage === "ru" ? "Тёмная" : "Dark";
    });
    document.querySelectorAll('[data-segment-group="theme"] .segment[data-value="system"]').forEach((node) => {
      node.textContent = state.uiLanguage === "ru" ? "Системная" : "System";
    });
  }

  function renderSegments() {
    document.querySelectorAll(".segments").forEach((group) => {
      const groupName = group.dataset.segmentGroup;
      const value = groupName === "uiLanguage"
        ? state.uiLanguage
        : (groupName === "nonBreakingSpaceStyle" ? state.options.nonBreakingSpaceStyle : state[groupName]);
      group.querySelectorAll(".segment").forEach((segment) => {
        segment.classList.toggle("is-active", segment.dataset.value === value);
      });
    });
  }

  function getRuleExample(ruleId) {
    const rules = getCopy("rules");
    const value = rules && rules[ruleId];
    if (Array.isArray(value) && value[2]) return value[2];
    if (Array.isArray(value) && value[1]) return value[1];
    return "";
  }

  function appendExamplePart(container, text, highlighted) {
    const span = createElement("span", highlighted ? "example-highlight" : "", text);
    container.appendChild(span);
  }

  function renderExample(ruleId, container) {
    container.textContent = "";
    const ru = isRu();
    const text = (...parts) => appendInlineParts(container, parts);
    const added = (value) => ({ text: value, highlight: true });
    const removed = (value) => ({ text: value, kind: "removed" });
    const strong = (value) => ({ text: value, highlight: false });

    switch (ruleId) {
      case "invisibleCopyArtifacts":
        text(ru ? "убирает мусор после вставки" : "removes paste leftovers");
        return;
      case "tabs":
        text(ru ? "таб → пробел" : "tab → space");
        return;
      case "manualLineBreaks":
        text(ru ? "Привет" : "Hello", removed("↵"), ru ? "мир → Привет мир" : "world → Hello world");
        return;
      case "ellipsis":
        text(ru ? "Подожди... → Подожди" : "Wait... → Wait", added("…"));
        return;
      case "extraSpaces":
        text(ru ? "Привет" : "Hello", removed("···"), ru ? "мир → Привет мир" : "world → Hello world");
        return;
      case "trimTextEdges":
        text(removed("··"), "2024 → 2024");
        return;
      case "spacingCleanup":
        text(ru ? "Привет" : "Hello", removed("·"), ru ? ", мир" : ", world", removed("·"), ru ? "! → Привет, мир!" : "! → Hello, world!");
        return;
      case "percentSignNoSpace":
        text("50", removed("·"), "% → 50%");
        return;
      case "numberUnitsNbsp":
        text(ru ? "300 МБ → 300" : "300 MB → 300", added("‿"), ru ? "МБ" : "MB");
        return;
      case "numberSigns":
        text("№ 8 → №", added("‿"), "8");
        return;
      case "specialSymbols":
        text("1/2 → ", added("½"), "  ·  >= → ", added("≥"));
        return;
      case "numberRangeDash":
        text("10-20 → 10", added("–"), "20");
        return;
      case "englishApostrophes":
        text("It's good → ", strong("It"), added("’"), strong("s good"));
        return;
      case "russianQuotes":
        text('"Привет" → ', added("«"), strong("Привет"), added("»"));
        return;
      case "englishQuotes":
        text('"Hello" → ', added("“"), strong("Hello"), added("”"));
        return;
      case "russianSentenceDash":
        text("Это - дом → Это ", added("—"), " дом");
        return;
      case "russianShortWordsNbsp":
        text("о проекте → о", added("‿"), "проекте · т. е. → т.", added("‿"), "е.");
        return;
      case "russianInitialsNbsp":
        text("А. С. Пушкин → А.", added("‿"), "С.", added("‿"), "Пушкин");
        return;
      case "russianNumericAbbreviations":
        text("10 тыс → 10", added("‿"), "тыс.");
        return;
      case "russianLargeNumbers":
        text("2132128 → 2", added("‿"), "132", added("‿"), "128");
        return;
      case "uiFinalPeriod":
        text(ru ? "Сохранено" : "Saved", removed("."), ru ? " → Сохранено" : " → Saved");
        return;
      default:
        container.textContent = getRuleExample(ruleId);
    }
  }

  function renderQuoteStyleRow(language, level) {
    const settingsCopy = getCopy("quoteSettings");
    const row = createElement("div", "quote-setting-row");
    const labelKey = level === "primaryQuoteStyle" ? "firstLevel" : "secondLevel";
    const label = createElement("div", "quote-setting-label", settingsCopy[labelKey]);
    const options = createElement("div", "quote-options");
    const currentValue = state.options?.quoteOptions?.[language]?.[level];

    quoteStyleOptions.forEach((option) => {
      const button = createElement("button", "quote-option", option.label);
      button.type = "button";
      button.classList.toggle("is-active", option.id === currentValue);
      button.onclick = (event) => {
        event.preventDefault();
        event.stopPropagation();
        state.options.quoteOptions = state.options.quoteOptions || {};
        state.options.quoteOptions[language] = state.options.quoteOptions[language] || {};
        state.options.quoteOptions[language][level] = option.id;
        saveCurrentSettings();
        render();
      };
      options.appendChild(button);
    });

    row.append(label, options);
    return row;
  }

  function appendInlineParts(container, parts) {
    parts.forEach((part) => {
      if (typeof part === "string") {
        container.appendChild(document.createTextNode(part));
        return;
      }

      const className = part.kind === "removed"
        ? "example-highlight is-removed"
        : (part.highlight ? "example-highlight" : "example-strong");
      container.appendChild(createElement("span", className, part.text));
    });
  }

  function getSelectedQuotePair(language, level) {
    const selectedId = state.options?.quoteOptions?.[language]?.[level];
    const selected = quoteStyleOptions.find((option) => option.id === selectedId);
    if (selected) return selected.sample;

    const fallbackId = language === "ru"
      ? (level === "primaryQuoteStyle" ? "frenchGuillemets" : "germanLowHigh")
      : (level === "primaryQuoteStyle" ? "englishDouble" : "englishSingle");
    return quoteStyleOptions.find((option) => option.id === fallbackId)?.sample || ['"', '"'];
  }

  function renderQuoteResult(language) {
    const settingsCopy = getCopy("quoteSettings");
    const result = createElement("div", "quote-settings-note");
    const [outerOpen, outerClose] = getSelectedQuotePair(language, "primaryQuoteStyle");
    const [innerOpen, innerClose] = getSelectedQuotePair(language, "secondaryQuoteStyle");

    if (language === "ru") {
      appendInlineParts(result, [
        `${settingsCopy.result} `,
        { text: `${outerOpen}Цитата `, highlight: false },
        { text: `${innerOpen}внутри${innerClose}`, highlight: true },
        { text: ` цитаты${outerClose}`, highlight: false },
      ]);
    } else {
      appendInlineParts(result, [
        `${settingsCopy.result} `,
        { text: `${outerOpen}A `, highlight: false },
        { text: `${innerOpen}nested${innerClose}`, highlight: true },
        { text: ` quote${outerClose}`, highlight: false },
      ]);
    }
    return result;
  }

  function renderQuoteSettings(language, enabled = true) {
    const block = createElement("div", "quote-settings");
    block.dataset.language = language;
    block.classList.toggle("is-disabled", !enabled);
    block.appendChild(renderQuoteStyleRow(language, "primaryQuoteStyle"));
    block.appendChild(renderQuoteStyleRow(language, "secondaryQuoteStyle"));
    block.appendChild(renderQuoteResult(language));
    return block;
  }

  function setOpenRuleGroup(nextGroupId) {
    state.openRuleGroup = nextGroupId;
    elements.app.dataset.openGroup = nextGroupId || "none";
    elements.app.dataset.rulesMode = nextGroupId ? "group" : "closed";

    elements.ruleGroups.querySelectorAll(".group").forEach((group) => {
      const isOpen = group.dataset.groupId === nextGroupId;
      group.classList.toggle("is-open", isOpen);
      const button = group.querySelector(".group-button");
      const chevron = group.querySelector(".group-button .chevron");
      if (button) button.setAttribute("aria-expanded", isOpen ? "true" : "false");
      if (chevron) chevron.textContent = isOpen ? "▾" : "▸";
    });
  }


  function renderNbspWidthSetting() {
    const row = createElement("div", "rule-option-row");
    row.dataset.setting = "nbsp-width";

    const label = createElement("div", "rule-option-label", getCopy("nbspLength"));
    const segments = createElement("div", "segments");
    segments.dataset.segmentGroup = "nonBreakingSpaceStyle";

    [
      ["regular", getCopy("nbspRegular")],
      ["narrow", getCopy("nbspThin")],
    ].forEach(([value, text]) => {
      const button = createElement("button", "segment", text);
      button.type = "button";
      button.dataset.value = value;
      button.classList.toggle("is-active", state.options.nonBreakingSpaceStyle === value);
      button.onclick = (event) => {
        event.preventDefault();
        event.stopPropagation();
        setSegment("nonBreakingSpaceStyle", value);
      };
      segments.appendChild(button);
    });

    row.append(label, segments);
    return row;
  }

  function renderRules() {
    elements.ruleGroups.textContent = "";

    groupOrder.forEach((groupId) => {
      const isOpen = state.openRuleGroup === groupId;
      const group = createElement("div", "group");
      group.dataset.groupId = groupId;
      group.classList.toggle("is-open", isOpen);
      group.classList.toggle("is-disabled", enabledRulesInGroup(groupId) === 0);

      const button = createElement("button", "group-button");
      button.type = "button";
      button.setAttribute("aria-expanded", isOpen ? "true" : "false");

      const chevron = createElement("span", "chevron", isOpen ? "▾" : "▸");
      const title = createElement("span", "group-title", getCopy(`groups.${groupId}`));
      const count = createElement("span", "group-count", `${enabledRulesInGroup(groupId)}/${totalRulesInGroup(groupId)}`);
      const groupSwitch = createSwitch(getGroupSwitchState(groupId), `group:${groupId}`);
      button.append(chevron, title, count, groupSwitch);
      button.onclick = (event) => {
        const rect = button.getBoundingClientRect();
        const clickedSwitchArea = event.clientX >= rect.right - 54;
        if (clickedSwitchArea) {
          state.animatedSwitchKeys = [
            `group:${groupId}`,
            ...ruleDefinitions.filter((rule) => rule.group === groupId).map((rule) => `rule:${rule.id}`),
          ];
          setGroupEnabled(groupId, enabledRulesInGroup(groupId) !== totalRulesInGroup(groupId));
          return;
        }
        setOpenRuleGroup(state.openRuleGroup === groupId ? null : groupId);
      };

      const content = createElement("div", "group-content");
      const contentInner = createElement("div", "group-content-inner");
      const ruleList = createElement("div", "rule-list");

      ruleDefinitions.filter((rule) => rule.group === groupId).forEach((rule) => {
        const ruleLabel = createElement("label", "rule");
        const isEnabled = state.enabledRules[rule.id] !== false;
        ruleLabel.classList.toggle("is-disabled", !isEnabled);
        const checkbox = document.createElement("input");
        checkbox.className = "switch-input";
        checkbox.type = "checkbox";
        checkbox.checked = isEnabled;
        checkbox.onchange = () => {
          state.animatedSwitchKeys = [`rule:${rule.id}`, `group:${groupId}`];
          state.enabledRules[rule.id] = checkbox.checked;
          saveCurrentSettings();
          render();
        };

        const ruleText = createElement("div");
        const ruleName = createElement("div", "rule-name", getCopy(`rules.${rule.id}`)[0]);
        const tag = createElement("span", "rule-tag", getCopy(`tags.${rule.tag}`));
        ruleName.appendChild(tag);
        const description = createElement("div", "rule-desc");
        renderExample(rule.id, description);
        const ruleSwitch = createSwitch(isEnabled ? "is-on" : "is-off", `rule:${rule.id}`);
        ruleText.append(ruleName, description);
        ruleLabel.append(ruleText, checkbox, ruleSwitch);
        ruleList.appendChild(ruleLabel);

        if (groupId === "quotes" && rule.id === "russianQuotes") {
          ruleList.appendChild(renderQuoteSettings("ru", isEnabled));
        }

        if (groupId === "quotes" && rule.id === "englishQuotes") {
          ruleList.appendChild(renderQuoteSettings("en", isEnabled));
        }
      });

      if (groupId === "russianTypography") {
        ruleList.appendChild(renderNbspWidthSetting());
      }

      contentInner.appendChild(ruleList);
      content.appendChild(contentInner);
      group.append(button, content);
      elements.ruleGroups.appendChild(group);
    });

    elements.rulesMeta.textContent = interpolate(state.uiLanguage === "ru" ? "{enabled} из {total} включено" : "{enabled} of {total} on", {
      enabled: enabledRulesCount(),
      total: totalRulesCount(),
    });
  }

  function shouldMuteMainNumber(info) {
    return !info.availableCount || !hasEnabledRules();
  }

  function getResultViewModel() {
    const message = state.lastApplyResultMessage || {};
    const totalReplacementCount = Number(message.totalReplacementCount || message.changesAppliedCount || 0);
    const changedNodeCount = Number(message.changedNodeCount || message.formattedLayerCount || 0);
    const skippedNodeCount = Number(message.skippedNodeCount || 0);
    const errorNodeCount = Number(message.errorNodeCount || message.errorCount || 0);
    const missingFontsCount = Number(message.skippedMissingFontsNodeCount || message.missingFontsCount || 0);
    const checkedNodeCount = Number(
      message.checkedNodeCount ??
      message.availableTextNodeCount ??
      (changedNodeCount + Number(message.unchangedNodeCount || 0))
    );
    const hasWarnings = skippedNodeCount > 0 || missingFontsCount > 0;
    const allSkipped =
      checkedNodeCount === 0 &&
      skippedNodeCount > 0 &&
      errorNodeCount === 0;
    let resultType = "done";

    if (message.type === "apply-cancelled" || message.wasCancelled) {
      resultType = "cancelled";
    } else if (allSkipped) {
      resultType = "unavailable";
    } else if (totalReplacementCount === 0 && changedNodeCount === 0 && errorNodeCount === 0) {
      resultType = "clean";
    } else if (hasWarnings || errorNodeCount > 0) {
      resultType = "errors";
    }

    const count = resultType === "clean" || resultType === "unavailable"
      ? 0
      : (resultType === "cancelled" ? Number(message.formattedBeforeCancelCount || changedNodeCount || 0) : totalReplacementCount);

    let label = "";
    if (resultType === "clean") {
      label = getCopy("result.alreadyClean");
    } else if (resultType === "unavailable") {
      label = getCopy("result.noAvailable");
    } else if (resultType === "cancelled") {
      label = getCopy("result.formattedBeforeCancel");
    } else {
      label = resultChangesLabel(totalReplacementCount, changedNodeCount);
    }

    return { message, resultType, count, label };
  }

  function renderPanels(info) {
    const isRules = state.activePanel === "rules";
    const isSettings = state.activePanel === "settings";
    const showResultCompact = state.view === "result" && (isRules || isSettings);
    const showMainCompact = state.view !== "result" && (isRules || isSettings);
    const showCompact = showMainCompact || showResultCompact;

    elements.rulesToggle.setAttribute("aria-expanded", isRules ? "true" : "false");
    elements.settingsToggle.setAttribute("aria-expanded", isSettings ? "true" : "false");
    elements.rulesPanel.classList.toggle("is-open", isRules);
    elements.settingsPanel.classList.toggle("is-open", isSettings);
    elements.formatArea.classList.toggle("is-compact", showCompact);
    elements.compactSummary.classList.toggle("is-visible", showCompact);

    if (showResultCompact) {
      const result = getResultViewModel();
      setNumberContent(elements.compactNumber, result.count);
      elements.compactNumber.classList.toggle("is-muted", (result.resultType === "clean" || result.resultType === "unavailable"));
      elements.compactLabel.textContent = result.label;
      return;
    }

    setNumberContent(elements.compactNumber, getHeroCount(info));
    elements.compactNumber.classList.toggle("is-muted", shouldMuteMainNumber(info));
    elements.compactLabel.textContent = isRu() ? getHeroLabel(info) : getCopy("main.compactReady");
  }

  function renderMain(info) {
    elements.scopeLabel.textContent = formatScope(info);
    setNumberContent(elements.heroNumber, state.isLoadingSettings && !state.lastSelectionInfoMessage ? "0" : getHeroCount(info));
    elements.heroNumber.classList.toggle("is-muted", state.isLoadingSettings && !state.lastSelectionInfoMessage ? true : shouldMuteMainNumber(info));
    elements.heroLabel.textContent = state.isLoadingSettings && !state.lastSelectionInfoMessage ? getCopy("main.checking") : getHeroLabel(info);
    renderStatusRows(elements.mainStatusRows, buildMainStatusRows(info));
  }

  function renderProgress() {
    const total = state.progressTotal || getSelectionInfo().availableCount || 0;
    const done = Math.min(state.progressDone || 0, total);
    const percent = total > 0 ? Math.round((done / total) * 100) : 0;

    setNumberContent(elements.progressNumber, done);
    elements.progressLabel.textContent = isRu()
      ? `из ${total}${NBSP}${ruTextLayerGenitive(total)} типографируется`
      : interpolate(getCopy("applying.label"), { total });
    elements.progressFill.style.setProperty("--progress", `${percent}%`);
  }

  function buildResultStatusRows(message, resultType) {
    const status = getCopy("status");
    const info = {
      lockedCount: Number(message.skippedLockedNodeCount || message.lockedCount || 0),
      hiddenCount: Number(message.skippedHiddenNodeCount || message.hiddenCount || 0),
      emptyCount: Number(message.skippedEmptyNodeCount || message.emptyCount || 0),
      nonEditableCount: Number(message.skippedNonEditableNodeCount || message.nonEditableCount || 0),
      missingFontsCount: Number(message.skippedMissingFontsNodeCount || message.missingFontsCount || 0),
      errorCount: Number(message.errorNodeCount || message.errorCount || 0),
    };

    if (resultType === "clean" || resultType === "unavailable") {
      const rows = [];
      const checkedCount = Number(
        message.checkedNodeCount ??
        message.availableTextNodeCount ??
        message.checkedLayerCount ??
        0
      );

      if (resultType === "clean") {
        rows.push([checkedLayersItem(checkedCount)]);
      }

      const skippedItems = [];
      if (info.missingFontsCount) skippedItems.push(statusItem("missingFonts", info.missingFontsCount));
      if (info.lockedCount) skippedItems.push(statusItem("locked", info.lockedCount));
      if (info.hiddenCount) skippedItems.push(statusItem("hidden", info.hiddenCount));
      if (info.emptyCount) skippedItems.push(statusItem("empty", info.emptyCount));
      if (info.nonEditableCount) skippedItems.push(statusItem("nonEditable", info.nonEditableCount));
      if (skippedItems.length) rows.push(skippedItems);
      return rows;
    }

    if (resultType === "cancelled") {
      return [[countLabel(Number(message.remainingCount || 0), getCopy("result.remaining"))]];
    }

    const warningItems = [];

    if (message.changedNodeCount !== undefined && resultType === "errors") {
      warningItems.push(statusItem("formatted", Number(message.changedNodeCount || 0)));
    }

    if (info.missingFontsCount) warningItems.push(statusItem("missingFonts", info.missingFontsCount));
    if (info.lockedCount) warningItems.push(statusItem("locked", info.lockedCount));
    if (info.hiddenCount) warningItems.push(statusItem("hidden", info.hiddenCount));
    if (info.emptyCount) warningItems.push(statusItem("empty", info.emptyCount));
    if (info.nonEditableCount) warningItems.push(statusItem("nonEditable", info.nonEditableCount));
    if (info.errorCount) warningItems.push(statusItem("error", info.errorCount));

    if (resultType === "done" && warningItems.length) {
      return [[status.skippedPrefix, ...warningItems]];
    }

    return warningItems.length ? [warningItems] : [];
  }

  function renderResult() {
    const result = getResultViewModel();
    setNumberContent(elements.resultNumber, result.count);
    elements.resultNumber.classList.toggle("is-muted", (result.resultType === "clean" || result.resultType === "unavailable"));
    elements.resultLabel.textContent = result.label;
    renderStatusRows(elements.resultStatusRows, buildResultStatusRows(result.message, result.resultType));

    if (state.view === "result") {
      setNumberContent(elements.heroNumber, result.count);
      elements.heroNumber.classList.toggle("is-muted", (result.resultType === "clean" || result.resultType === "unavailable"));
      elements.heroLabel.textContent = result.label;
      renderStatusRows(elements.mainStatusRows, buildResultStatusRows(result.message, result.resultType));
    }
  }

  function renderPrimaryAction(info) {
    const disabled = state.isLoadingSettings || state.isApplying || !info.availableCount || !hasEnabledRules();

    if (state.view === "result") {
      elements.primaryAction.disabled = false;
      elements.primaryAction.textContent = getCopy("done");
      return;
    }

    elements.primaryAction.disabled = disabled;
    elements.primaryAction.textContent = info.scopeType === "currentPage" ? getCopy("applyToCurrentPage") : getCopy("applyFormatting");
  }

  function render() {
    elements.app.dataset.panel = state.activePanel;
    elements.app.dataset.view = state.view;
    elements.app.dataset.openGroup = state.openRuleGroup || "none";
    elements.app.dataset.rulesMode = state.activePanel === "rules" ? (state.openRuleGroup ? "group" : "closed") : "none";
    applyTheme();
    renderText();
    renderRules();
    renderSegments();

    const info = getSelectionInfo();
    renderMain(info);
    renderPanels(info);
    renderProgress();
    renderResult();
    renderPrimaryAction(info);

    const isResultView = state.view === "result";
    const isPanelOpen = state.activePanel === "rules" || state.activePanel === "settings";

    [elements.formatTab, elements.rulesTab, elements.settingsTab].forEach((tab) => {
      if (!tab) return;
      tab.classList.toggle("is-active", tab.dataset.sidePanel === state.activePanel);
    });

    elements.navigationRows.classList.toggle("is-hidden", !isPanelOpen);
    elements.progressScreen.classList.remove("is-visible");
    elements.resultScreen.classList.remove("is-visible");
    elements.compactSummary.classList.toggle("is-hidden", !isPanelOpen);

    if (state.animatedSwitchKeys.length) {
      const renderedAnimationKeys = state.animatedSwitchKeys.join("|");
      requestAnimationFrame(() => {
        if (state.animatedSwitchKeys.join("|") === renderedAnimationKeys) {
          state.animatedSwitchKeys = [];
        }
      });
    }
  }

  function applySettingsToState(settings) {
    const safeSettings = settings || {};
    const safeEnabledRules = safeSettings.enabledRules || {};
    state.languageMode = safeSettings.languageMode || "auto";
    state.options = {
      ...state.options,
      ...(safeSettings.options || {}),
      quoteOptions: {
        ...state.options.quoteOptions,
        ...((safeSettings.options || {}).quoteOptions || {}),
      },
    };

    const defaults = getDefaultEnabledRules(state.languageMode);
    ruleDefinitions.forEach((rule) => {
      state.enabledRules[rule.id] = safeEnabledRules[rule.id] !== undefined ? Boolean(safeEnabledRules[rule.id]) : defaults[rule.id];
    });
  }

  function setSegment(groupName, value) {
    if (groupName === "uiLanguage") {
      const normalized = normalizeUiLanguage(value);
      if (!normalized) return;
      state.uiLanguage = normalized;
      saveCurrentUiSettings();
      render();
      return;
    }

    if (groupName === "theme") {
      const normalized = normalizeTheme(value);
      if (!normalized) return;
      state.theme = normalized;
      saveCurrentUiSettings();
      render();
      return;
    }

    if (groupName === "nonBreakingSpaceStyle") {
      // The UI only stores and forwards the selected width.
      // The typography engine decides which rules use this option.
      state.options.nonBreakingSpaceStyle = value === "narrow" ? "narrow" : "regular";
      saveCurrentSettings();
      render();
      return;
    }

    if (groupName === "languageMode") {
      state.languageMode = value === "ru" || value === "en" || value === "auto" ? value : "auto";
      saveCurrentSettings();
      render();
    }
  }

  document.querySelectorAll(".segment").forEach((segment) => {
    segment.onclick = () => {
      const group = segment.closest(".segments");
      if (!group) return;
      setSegment(group.dataset.segmentGroup, segment.dataset.value);
    };
  });

  function openSidePanel(panel) {
    if (panel !== "main" && state.view === "result") {
      state.lastApplyResultMessage = null;
      state.applySelectionSignature = null;
      state.progressDone = 0;
      state.progressTotal = 0;
      state.isApplying = false;
      state.view = "main";
    }

    if (panel === "main") {
      state.activePanel = "main";
      state.openRuleGroup = null;
      render();
      return;
    }

    setActivePanel(panel);
  }

  elements.formatTab.onclick = () => openSidePanel("main");
  elements.rulesTab.onclick = () => openSidePanel("rules");
  elements.settingsTab.onclick = () => openSidePanel("settings");

  elements.rulesToggle.onclick = () => setActivePanel("rules");
  elements.settingsToggle.onclick = () => setActivePanel("settings");

  elements.resetDefaults.onclick = () => {
    const quoteDefaults = getDefaultQuoteOptions();

    state.enabledRules = getDefaultEnabledRules(state.languageMode);
    state.options.nonBreakingSpaceStyle = "regular";

    if (state.languageMode === "ru") {
      state.options.quoteOptions.ru = { ...quoteDefaults.ru };
    } else if (state.languageMode === "en") {
      state.options.quoteOptions.en = { ...quoteDefaults.en };
    } else {
      state.options.quoteOptions = {
        ru: { ...quoteDefaults.ru },
        en: { ...quoteDefaults.en },
      };
    }

    saveCurrentSettings();
    render();
  };

  elements.primaryAction.onclick = () => {
    const info = getSelectionInfo();

    if (state.view === "result") {
      state.lastApplyResultMessage = null;
      state.applySelectionSignature = null;
      state.progressDone = 0;
      state.progressTotal = 0;
      state.isApplying = false;
      state.activePanel = "main";
      state.openRuleGroup = null;
      setView("main");
      return;
    }

    if (!info.availableCount || !hasEnabledRules() || state.isApplying) return;

    state.progressDone = 0;
    state.progressTotal = info.availableCount;
    state.applySelectionSignature = getSelectionSignature(state.lastSelectionInfoMessage);
    state.isApplying = true;
    state.activePanel = "main";
    state.openRuleGroup = null;
    render();

    parent.postMessage({
      pluginMessage: {
        type: "apply",
        settings: getSettings(),
        uiSettings: getUiSettings(),
      },
    }, "*");
  };

  window.onmessage = (event) => {
    const message = event.data.pluginMessage;
    if (!message) return;

    if (message.type === "settings-loaded") {
      const uiSettings = message.uiSettings || {};
      state.uiLanguage = readStoredUiLanguage() || normalizeUiLanguage(uiSettings.uiLanguage) || state.uiLanguage;
      state.theme = readStoredTheme() || normalizeTheme(uiSettings.theme) || state.theme;
      applySettingsToState(message.settings);
      state.isLoadingSettings = false;
      saveCurrentUiSettings();
      render();
      return;
    }

    if (message.type === "selection-info") {
      const nextSelectionSignature = getSelectionSignature(message);
      state.lastSelectionInfoMessage = message;
      state.currentTargetScope = message.targetScope || "selection";
      state.currentAvailableTextNodeCount = Number(message.availableTextNodeCount || 0);

      if (state.isApplying) {
        render();
        return;
      }

      if (state.view === "result") {
        const sameSelectionAsApply =
          Boolean(state.applySelectionSignature) &&
          nextSelectionSignature === state.applySelectionSignature;

        if (sameSelectionAsApply) {
          render();
          return;
        }
      }

      state.lastApplyResultMessage = null;
      state.applySelectionSignature = null;
      state.activePanel = "main";
      state.openRuleGroup = null;
      state.view = "main";
      render();
      return;
    }

    if (message.type === "apply-start") {
      state.isApplying = true;
      state.progressDone = 0;
      state.progressTotal = Number(message.total || message.totalToProcessCount || getSelectionInfo().availableCount || 0);
      render();
      return;
    }

    if (message.type === "apply-progress") {
      state.isApplying = true;
      state.progressDone = Number(message.done || message.processedCount || 0);
      state.progressTotal = Number(message.total || message.totalToProcessCount || state.progressTotal || 0);
      render();
      return;
    }

    if (message.type === "apply-cancelled") {
      state.isApplying = false;
      state.lastApplyResultMessage = message;
      state.lastApplyCompletedAt = Date.now();
      state.activePanel = "main";
      state.openRuleGroup = null;
      setView("result");
      return;
    }

    if (message.type === "apply-result" || message.type === "apply-complete") {
      state.isApplying = false;
      state.lastApplyResultMessage = message;
      state.lastApplyCompletedAt = Date.now();
      state.progressDone = state.progressTotal || Number(message.availableTextNodeCount || message.totalTextNodeCount || 0);
      state.activePanel = "main";
      state.openRuleGroup = null;
      setView("result");
      return;
    }
  };

  if (window.matchMedia) {
    const media = window.matchMedia("(prefers-color-scheme: dark)");
    if (media.addEventListener) media.addEventListener("change", applyTheme);
    else if (media.addListener) media.addListener(applyTheme);
  }

  render();
</script>
